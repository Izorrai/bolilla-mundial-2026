# Sirve los archivos estaticos del repo bajo http://localhost:5050 (mapeado por compose).
# Cloudflare Tunnel terminara TLS y reenviara a este nginx.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion para JSON y HTML (Cloudflare ya comprime, pero por si acaso)
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # JSONs siempre fresquitos — no se cachean
    location ~* \.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    # HTML pequeño TTL — los retoques deben verse rapido
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # CSS/JS de assets — sirven con cache moderado
    location /assets/ {
        add_header Cache-Control "public, max-age=600" always;
        try_files $uri =404;
    }

    # Negar acceso a metadatos del repo y carpetas internas
    location ~ /\.(git|github|env)        { deny all; return 404; }
    location ~ ^/(scripts|deploy)/        { deny all; return 404; }
    location = /README.md                 { deny all; return 404; }
    location = /.gitignore                { deny all; return 404; }

    # Resto: ficheros normales
    location / {
        try_files $uri $uri/ =404;
    }
}

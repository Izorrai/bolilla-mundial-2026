services:
  bolilla-web:
    image: nginx:alpine
    container_name: bolilla-web
    restart: unless-stopped
    ports:
      - "5050:80"
    volumes:
      # Sirve los archivos del repo directamente, en solo lectura.
      # El cron del host (crontab) actualiza los JSON y nginx los expone.
      - ../:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # wget --spider de busybox: solo comprueba que el endpoint responde,
      # sin descargar el body (mucho mas ligero y fiable). Si no responde
      # en 5s, el container se marca unhealthy y docker lo intentara reiniciar.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview · Crónica del Bot</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a1f26;
    --card-hover: #1f2630;
    --border: #2d3540;
    --text: #e7eaee;
    --muted: #8a93a0;
    --accent: #4a9eff;
    --gold: #d4a017;
    --green: #2f7a3a;
    --red: #c0392b;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.4; }
  header { background: var(--card); padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 18px; }
  header .warn { font-size: 12px; color: var(--gold); background: rgba(212,160,23,0.15); padding: 4px 10px; border-radius: 16px; }
  header .select-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  header label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  header select { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
  main { max-width: 760px; margin: 0 auto; padding: 18px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 12px; color: var(--muted); }
  button { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; }
  button:hover { background: var(--border); }
  .event { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: start; }
  .event:hover { background: var(--card-hover); }
  .pers-tag { font-size: 10px; padding: 3px 9px; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; align-self: start; }
  .pers-tag.cuñao      { background: rgba(231,127,52,0.25); color: #ffc499; }
  .pers-tag.cronista   { background: rgba(74,158,255,0.22); color: #a8d0ff; }
  .pers-tag.sarcastico { background: rgba(155,89,182,0.25); color: #d8b7ed; }
  .pers-tag.meme       { background: rgba(241,196,15,0.20); color: #f8da55; }
  .pers-tag.residuos   { background: rgba(47,122,58,0.25); color: #8edaa0; }
  .text { font-size: 15px; line-height: 1.45; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; white-space: nowrap; }
  .ev-type { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
  .empty { padding: 30px; text-align: center; color: var(--muted); font-style: italic; }
  .counts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .count-chip { background: var(--card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 14px; font-size: 11px; color: var(--muted); }
  .count-chip strong { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1>🤖 Preview Crónica del Bot</h1>
  <span class="warn">privado · no compartas el link</span>
  <div class="select-wrap">
    <label for="feedSelect">Feed</label>
    <select id="feedSelect">
      <option value="data/feed/grupoagaleus.json">GrupoAgaleus (bolilla)</option>
      <option value="data/feed/deustobarakaultimate.json">DeustoBarakaUltimate (bolilla)</option>
      <option value="data/feed/porra.json">Porra</option>
    </select>
  </div>
</header>

<main>
  <div class="toolbar">
    <span id="updated">—</span>
    <button id="btnRefresh">🔄 Refrescar</button>
  </div>

  <div class="counts" id="counts"></div>

  <div id="events">
    <div class="empty">Cargando…</div>
  </div>
</main>

<script>
const PERS_NAMES = {
  "cuñao": "Cuñao",
  "cronista": "Cronista",
  "sarcastico": "Sarcástico",
  "meme": "Meme",
  "residuos": "Residuos",
};

const TYPE_NAMES = {
  "overtake": "Adelantamiento",
  "big_up": "Subida grande",
  "big_down": "Caída grande",
  "new_leader": "Nuevo líder",
  "new_last": "Nuevo último",
  "debut": "Debut",
};

function escapeHtml(s) { return (s ?? "").toString().replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function fmtDate(iso) {
  if (!iso) return "—";
  try { return new Date(iso).toLocaleString("es-ES", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" }); }
  catch { return iso; }
}

async function loadFeed(url) {
  const events = document.getElementById("events");
  events.innerHTML = `<div class="empty">Cargando…</div>`;
  try {
    const r = await fetch(url + "?t=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const doc = await r.json();
    document.getElementById("updated").textContent = "Actualizado " + fmtDate(doc.last_updated);

    // Conteos por personaje + por tipo
    const byPers = {}, byType = {};
    for (const e of doc.events || []) {
      byPers[e.personaje] = (byPers[e.personaje] || 0) + 1;
      byType[e.type] = (byType[e.type] || 0) + 1;
    }
    let chips = "";
    chips += `<span class="count-chip">Total: <strong>${(doc.events||[]).length}</strong></span>`;
    for (const [pers, n] of Object.entries(byPers)) {
      chips += `<span class="count-chip">${PERS_NAMES[pers] || pers}: <strong>${n}</strong></span>`;
    }
    for (const [t, n] of Object.entries(byType)) {
      chips += `<span class="count-chip">${TYPE_NAMES[t] || t}: <strong>${n}</strong></span>`;
    }
    document.getElementById("counts").innerHTML = chips;

    if (!doc.events || doc.events.length === 0) {
      events.innerHTML = `<div class="empty">No hay eventos todavía. Espera al próximo cron o ejecuta <code>bash deploy/cron-update.sh</code> en el server.</div>`;
      return;
    }

    let html = "";
    for (const e of doc.events) {
      const persClass = e.personaje || "cronista";
      html += `<div class="event">
        <span class="pers-tag ${persClass}">${PERS_NAMES[persClass] || persClass}</span>
        <div>
          <div class="text">${escapeHtml(e.text)}</div>
          <div class="ev-type">${TYPE_NAMES[e.type] || e.type}</div>
        </div>
        <div class="meta">${fmtDate(e.ts)}</div>
      </div>`;
    }
    events.innerHTML = html;
  } catch (err) {
    events.innerHTML = `<div class="empty">Error cargando ${escapeHtml(url)}: ${escapeHtml(err.message)}</div>`;
  }
}

document.getElementById("feedSelect").addEventListener("change", e => loadFeed(e.target.value));
document.getElementById("btnRefresh").addEventListener("click", () => loadFeed(document.getElementById("feedSelect").value));
loadFeed(document.getElementById("feedSelect").value);
setInterval(() => loadFeed(document.getElementById("feedSelect").value), 60000);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") loadFeed(document.getElementById("feedSelect").value);
});
</script>
</body>
</html>

name: Update scores

on:
  schedule:
    # Cada 30 minutos durante el periodo del Mundial.
    # GitHub puede retrasar los cron hasta 15 min en periodos de carga alta.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestana Actions
  push:
    paths:
      - "data/rooms/**/participants.json"   # bolilla: cuando una sala sube nuevas inscripciones
      - "data/rooms.json"                    # bolilla: cuando se anade/quita una sala
      - "data/teams.json"                    # bolilla: cambios en catalogo o reglas
      - "data/porra/predictions.json"        # porra: cuando llegan nuevos pronosticos
      - "data/porra/initial_results.json"    # porra: cuando se ponen resultados oficiales
      - "data/porra/config.json"             # porra: cambios de reglas
      - "scripts/update_scores.py"           # bolilla: cambio de logica
      - "scripts/update_porra.py"            # porra: cambio de logica
      - "scripts/fetch_fixtures.py"          # cambio del fetch del calendario

permissions:
  contents: write   # necesario para commitear los JSONs actualizados

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch_fixtures.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python scripts/fetch_fixtures.py

      - name: Run update_scores.py (bolilla)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python scripts/update_scores.py

      - name: Run update_porra.py
        run: |
          python scripts/update_porra.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/fixtures.json data/rooms/*/scoreboard.json data/porra/porra_scoreboard.json
          if git diff --cached --quiet; then
            echo "Sin cambios en JSONs"
            exit 0
          fi
          git commit -m "chore(scores): refresh matches and scoreboard"
          # Retry push hasta 3 veces con rebase para sobrevivir race conditions
          # cuando empujamos a la vez que el organizador o que otro run del cron.
          for i in 1 2 3; do
            if git push; then
              echo "Push exitoso en intento $i"
              exit 0
            fi
            echo "Push rechazado en intento $i, rebaseando contra remoto..."
            git pull --rebase origin main || git rebase --abort
          done
          echo "Push fallo tras 3 intentos"
          exit 1

name: Update scores

on:
  # Cron DESACTIVADO: ahora el servidor bolilla.agaleus.com es la fuente de verdad
  # (cron del host cada 5 min real, sin throttling). Si el servidor estuviera caido,
  # puedes lanzar este workflow a mano desde la pestaña Actions con "Run workflow".
  # Lo dejamos sin schedule para no tener "crones duelos" pisandose data/*.json.
  workflow_dispatch: {}   # solo manual

permissions:
  contents: write   # necesario para commitear los JSONs actualizados

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch_fixtures.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python scripts/fetch_fixtures.py

      - name: Run update_scores.py (bolilla)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python scripts/update_scores.py

      - name: Run update_porra.py
        run: |
          python scripts/update_porra.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/fixtures.json data/scorers.json data/rooms/*/scoreboard.json data/porra/porra_scoreboard.json
          if git diff --cached --quiet; then
            echo "Sin cambios, forzando timestamp para mantener workflow activo"
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/.last_run
            git add data/.last_run
          fi
          git commit -m "chore(scores): refresh matches and scoreboard"
          # Retry push hasta 5 veces con rebase. En conflicto, siempre nos quedamos
          # con la version recien generada (-X theirs durante rebase = nuestros commits).
          # Los JSONs son regenerables; lo "fresh" gana al "obsoleto".
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push exitoso en intento $i"
              exit 0
            fi
            echo "Push rechazado en intento $i, rebaseando..."
            git pull --rebase -X theirs origin main || {
              echo "Rebase fallo; abortando y reintentando con reset"
              git rebase --abort 2>/dev/null || true
              # Plan B: hard reset al remoto y regenerar
              git fetch origin main
              git reset --hard origin/main
              python scripts/fetch_fixtures.py
              python scripts/update_scores.py
              python scripts/update_porra.py
              git add data/matches.json data/fixtures.json data/scorers.json data/rooms/*/scoreboard.json data/porra/porra_scoreboard.json
              if git diff --cached --quiet; then
                echo "Sin cambios tras regenerar"
                exit 0
              fi
              git commit -m "chore(scores): refresh matches and scoreboard"
            }
          done
          echo "Push fallo tras 5 intentos"
          exit 1

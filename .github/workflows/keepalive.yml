name: Keepalive

# GitHub desactiva los workflows con cron tras 60 dias sin actividad en el repo.
# Esto evita que se duerma el cron de update_scores (que actualiza marcadores
# y rankings) durante periodos de poca actividad. Hace un commit inocuo cada
# 6 horas para mantener el repo "vivo".
# Ref: https://github.com/gautamkrishnar/keepalive-workflow

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuadro · Bolilla Mundial 2026</title>
<link rel="stylesheet" href="assets/today-carousel.css">
<style>
  :root {
    --green: #2f7a3a;
    --green-light: #d4ecd6;
    --green-dark: #1d4e25;
    --bg: #f5f5f1;
    --card: #ffffff;
    --border: #d8d8d2;
    --text: #1a1a1a;
    --muted: #6a6a64;
    --live: #c0392b;
    --conn: #c4c4bc;
    --wbg: #d4ecd6;
    --wtx: #1d4e25;
    --accent: var(--green);
    --accent-light: var(--green-light);
    --accent-dark: var(--green-dark);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--green); color: white; padding: 14px 20px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  header .row1 { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
  header .sub { font-size: 13px; opacity: 0.9; margin-top: 2px; }
  nav { padding: 6px 0 0 0; display: flex; gap: 0; margin-top: 8px; }
  nav a { color: white; text-decoration: none; padding: 6px 14px; font-size: 13px; font-weight: 600; opacity: 0.7; border-bottom: 2px solid transparent; }
  nav a.active { opacity: 1; border-color: white; }
  nav a:hover { opacity: 1; }
  .updated { font-size: 11px; color: var(--muted); text-align: right; padding: 6px 16px 0; }
  #loading { padding: 60px; text-align: center; color: var(--muted); font-style: italic; }
  #err { padding: 40px; text-align: center; color: var(--live); }
  .wrap { overflow-x: auto; padding: 16px 16px 40px; }

  /* ── BRACKET ── */
  .bracket { display: flex; align-items: flex-start; min-width: max-content; }
  .round-col { display: flex; flex-direction: column; flex-shrink: 0; }
  .round-lbl { height: 22px; display: flex; align-items: flex-end; padding-bottom: 5px; padding-left: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); white-space: nowrap; }
  .slots { display: flex; flex-direction: column; }
  .slot { display: flex; align-items: center; flex-shrink: 0; }

  /* Card — must fit within UNIT (74px). Rows 27px×2 + meta ~14px ≈ 68px */
  .mc { background: var(--card); border: 1px solid var(--border); border-radius: 6px; width: 156px; overflow: hidden; flex-shrink: 0; }
  .mc.live-c { border-color: var(--live); }
  .tr { display: flex; align-items: center; padding: 0 8px; height: 27px; gap: 6px; border-bottom: 1px solid var(--border); }
  .tr:last-of-type { border-bottom: none; }
  .tr.w { background: var(--wbg); }
  .tr img { width: 18px; height: 13px; object-fit: contain; flex-shrink: 0; border: 0.5px solid #ddd; border-radius: 1px; }
  .tr .tn { flex: 1; font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .tr.w .tn { color: var(--wtx); font-weight: 700; }
  .tr .sc { font-size: 12px; font-weight: 800; min-width: 14px; text-align: right; flex-shrink: 0; }
  .tr.w .sc { color: var(--wtx); }
  .mc-meta { font-size: 9px; color: var(--muted); padding: 2px 8px; line-height: 14px; border-top: 1px solid var(--border); background: #fafaf8; white-space: nowrap; overflow: hidden; }
  .live-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--live); margin-right: 3px; vertical-align: middle; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .tbd { background: var(--card); border: 1px dashed var(--border); border-radius: 6px; width: 156px; flex-shrink: 0; }
  .tbd-r { display: flex; align-items: center; padding: 0 8px; height: 27px; gap: 6px; border-bottom: 1px dashed var(--border); }
  .tbd-r:last-child { border-bottom: none; }
  .tbd-flag { width: 18px; height: 13px; background: #e8e8e2; border-radius: 1px; flex-shrink: 0; }
  .tbd-n { font-size: 11px; color: var(--muted); font-style: italic; }

  .conn-svg { flex-shrink: 0; display: block; margin-top: 22px; }
  .trophy { font-size: 32px; align-self: center; padding: 0 8px; margin-top: 22px; }
</style>
<link rel="stylesheet" href="assets/theme.css">
</head>
<body class="theme-agaleus">
<header>
  <div class="row1">
    <div>
      <h1><img class="room-logo" src="assets/agaleus-logo.png" alt="Grupo Agaleus"> <span>Cuadro · Bolilla Mundial 2026</span></h1>
      <div class="sub">Fase final · Cuadro eliminatorio</div>
    </div>
  </div>
  <nav>
    <a href="leaderboard.html">Clasificación</a>
    <a href="results.html">Resultados</a>
    <a href="bracket.html" class="active">Cuadro</a>
  </nav>
</header>
<div id="loading">Cargando cuadro...</div>
<div id="err" style="display:none"></div>
<div id="upd" class="updated" style="display:none"></div>
<div class="wrap" id="wrap" style="display:none">
  <div class="bracket" id="bracket"></div>
</div>
<script>
const ROUNDS = [
  { label:"Dieciseisavos", keys:["LAST_32","ROUND_OF_32"],
    ids:[537417,537418, 537415,537416, 537419,537420, 537421,537422,
         537423,537424, 537425,537426, 537427,537428, 537429,537430] },
  { label:"Octavos",  keys:["LAST_16","ROUND_OF_16"],
    ids:[537376,537375, 537379,537380, 537377,537378, 537381,537382] },
  { label:"Cuartos",  keys:["QUARTER_FINALS"],  ids:[537383,537384,537385,537386] },
  { label:"Semifinal",keys:["SEMI_FINALS"],      ids:[537387,537388] },
  { label:"Final",    keys:["FINAL"],            ids:[537389] },
];
const UNIT=74, FINISHED=["FINISHED"], LIVE=["IN_PLAY","PAUSED","LIVE"];
let NAMES={};
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function tname(fd){ return NAMES[(fd||"").toLowerCase()]||fd||"?"; }
function fmtDate(iso){
  if(!iso) return "";
  try{ return new Date(iso).toLocaleString("es-ES",{weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }
  catch{ return iso; }
}
function getWinner(f){
  if(!FINISHED.includes(f.status)) return null;
  if(f.winner) return f.winner;
  if(f.home_goals!=null&&f.away_goals!=null){
    if(f.home_goals>f.away_goals) return f.home_team;
    if(f.away_goals>f.home_goals) return f.away_team;
  }
  return null;
}
function buildCard(f){
  if(!f||(!f.home_team&&!f.away_team&&!FINISHED.includes(f.status)&&!LIVE.includes(f.status))){
    return `<div class="tbd"><div class="tbd-r"><div class="tbd-flag"></div><span class="tbd-n">Por definir</span></div><div class="tbd-r"><div class="tbd-flag"></div><span class="tbd-n">Por definir</span></div></div>`;
  }
  const fin=FINISHED.includes(f.status), live=LIVE.includes(f.status);
  const w=getWinner(f), hw=w&&w===f.home_team, aw=w&&w===f.away_team;
  const hn=f.home_team?tname(f.home_team):"Por definir";
  const an=f.away_team?tname(f.away_team):"Por definir";
  const hi=f.home_crest?`<img src="${esc(f.home_crest)}" alt="${esc(hn)}" loading="lazy">`:'<div class="tbd-flag"></div>';
  const ai=f.away_crest?`<img src="${esc(f.away_crest)}" alt="${esc(an)}" loading="lazy">`:'<div class="tbd-flag"></div>';
  const hsc=(fin||live)?(f.home_goals??0):"", asc=(fin||live)?(f.away_goals??0):"";
  let extra="";
  if(f.duration==="PENALTY_SHOOTOUT"&&f.penalties_home!=null) extra=` · Pen ${f.penalties_home}–${f.penalties_away}`;
  else if(f.duration==="EXTRA_TIME") extra=" · Pról.";
  const meta=live
    ?`<div class="mc-meta"><span class="live-dot"></span>${f.minute?f.minute+"' · ":""}${fmtDate(f.utcDate)}</div>`
    :`<div class="mc-meta">${fmtDate(f.utcDate)}${extra}</div>`;
  return `<div class="mc${live?" live-c":""}">
    <div class="tr${hw?" w":""}">${hi}<span class="tn">${esc(hn)}</span><span class="sc">${hsc}</span></div>
    <div class="tr${aw?" w":""}">${ai}<span class="tn">${esc(an)}</span><span class="sc">${asc}</span></div>
    ${meta}</div>`;
}
function buildConnectorSVG(n, slotH, totalH){
  // SVG connector: for each pair, draw bracket lines at card centers (slotH/2 and 3*slotH/2)
  // connected by a vertical, plus a stub going right from the midpoint.
  const W=20, midX=10;
  let d='';
  for(let p=0;p<n/2;p++){
    const topY=p*2*slotH + slotH/2;   // center of top card
    const midY=p*2*slotH + slotH;     // midpoint between cards
    const botY=p*2*slotH + 3*slotH/2; // center of bottom card
    // bracket arms from left + vertical + stub right
    d+=`M0 ${topY} H${midX} V${botY} H0 M${midX} ${midY} H${W} `;
  }
  return `<svg class="conn-svg" width="${W}" height="${totalH}" xmlns="http://www.w3.org/2000/svg"><path d="${d.trim()}" stroke="var(--conn)" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/></svg>`;
}
function render(fixtures){
  const byId={};
  for(const f of fixtures) byId[f.id]=f;
  const active=ROUNDS.filter(r=>r.ids.some(id=>byId[id]));
  if(!active.length){
    document.getElementById("bracket").innerHTML='<div style="padding:40px;color:#888;font-style:italic;">Las eliminatorias aún no comenzaron.</div>';
    return;
  }
  const maxN=active[0].ids.length;
  const parts=[];
  for(let ri=0;ri<active.length;ri++){
    const round=active[ri], n=round.ids.length;
    const slotH=(maxN/n)*UNIT, totalH=maxN*UNIT;
    let col=`<div class="round-col"><div class="round-lbl">${esc(round.label)}</div><div class="slots" style="height:${totalH}px;">`;
    for(let mi=0;mi<n;mi++){
      col+=`<div class="slot" style="height:${slotH}px;">${buildCard(byId[round.ids[mi]]||null)}</div>`;
    }
    col+=`</div></div>`;
    parts.push(col);
    if(ri<active.length-1){
      parts.push(buildConnectorSVG(n, slotH, totalH));
    }
  }
  parts.push('<div class="trophy">🏆</div>');
  document.getElementById("bracket").innerHTML=parts.join("");
}
async function load(){
  try{
    const [fd,td]=await Promise.all([
      fetch("data/fixtures.json?t="+Date.now()).then(r=>r.json()),
      fetch("data/teams.json?t="+Date.now()).then(r=>r.json()).catch(()=>null),
    ]);
    NAMES={};
    if(td?.teams) for(const t of td.teams) if(t.fd_name&&t.name) NAMES[t.fd_name.toLowerCase()]=t.name;
    render(fd.fixtures||[]);
    document.getElementById("loading").style.display="none";
    document.getElementById("wrap").style.display="";
    if(fd.last_updated){const el=document.getElementById("upd");el.style.display="";el.textContent="Actualizado: "+new Date(fd.last_updated).toLocaleString("es-ES");}
  }catch(e){
    document.getElementById("loading").style.display="none";
    const el=document.getElementById("err");el.style.display="";el.textContent="Error: "+e.message;
  }
}
load();setInterval(load,60000);
</script>
</body>
</html>
